    html {
    font-family: 'poppinsregular';

    }
    .mainContent {
    margin-left: 100px;

    .search {
    min-width: 50%;

    height: 100;

    float: right;

    line-height: 0.5;
    margin-bottom: -1;

    opacity: 0.5;

    <div class="fakeHeader">
      <img src="https://i.imgur.com/b6iPWt2.png"></img>
      <input type="search" id="search" class="search" inputmode="search" placeholder="Search 🍳">
    </div>
  </head>
  <body>
    <div class="mainContent">
    <p class="query" style="color: white">Showing results for <em id="query">nothing, search something!</em></p>

      <div id="songList"></div>
    </div>
    <script src="https://connect.soundcloud.com/sdk/sdk-3.3.2.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      // Song Variables
      var queue = new Array
      var current_song = new Audio()

      const print = console.log
      const searchBar = document.getElementById("search")
      SC.initialize({
        client_id: 'c7qRtooYX5D1QXCM7DmD1J4E7v5YcxpR'
      });

      var socket = io()
      var to_search = ""
      var song_to_play = ""
      var songList = document.getElementById('songList')
      var queryFor = document.getElementById('query')

      searchBar.addEventListener('search', (event) => {
        to_search = event.target.value
        socket.emit('search', to_search);
      })

      socket.on('results', function(msg) {
        displaySearch(msg)
      })

      function displaySearch(msg) {
        var to_add_to_songList = new Set
        var list = msg.list
        var songs = msg.songs

        songList.replaceChildren()

        queryFor.textContent = `"${msg.query}"`
        document.title = `Results for "${msg.query}" | Omni 0.2.0`

        for (i = 0; i < songs.length; i++) {
          song_index = songs[i]

          let item = document.createElement('div')
          let item_text = document.createElement('a')
          let item_author = document.createElement('a')
          let item_image = document.createElement('img')
          let icon = document.createElement('img')
          let play_button = document.createElement('img')

          item.className = "Listing"
          item_text.className = "songTitle"
          item_author.className = "songAuthor"

          item_image.src = song_index.thumbnail
          item_image.className = "thumbnail"
          item_image.song_url = song_index.stream_url
          item_image.onclick = play
          item_image.onmouseenter = function(event) {
            song_to_play = event.path[0].song_url
          }
          icon.className = "icon"
          icon.src = "https://i.imgur.com/rryJuFC.png"
          item_text.href = song_index.url
          item_author.href = song_index.author_url
          item_text.target = "_blank"
          item_author.target = "_blank"

          item_text.textContent = song_index.title
          item_author.textContent = ` ${song_index.author}`
          item.appendChild(item_image)
          item.appendChild(item_text)
          item.appendChild(item_author)
          item.appendChild(icon)

          item.style.setProperty("height", "100px", "important")
          item_text.style.setProperty("color", "white", "important")
          item_author.style.setProperty("color", "#736094", "important")


          songList.appendChild(item)
        }
      }

      function play() {
        print(song_to_play)
        current_song.src = song_to_play
        current_song.play()
      }
    </script>
  </body>
